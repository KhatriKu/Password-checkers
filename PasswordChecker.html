<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .strength {
            font-weight: bold;
        }
        .weak {
            color: red;
        }
        .medium {
            color: orange;
        }
        .strong {
            color: green;
        }
    </style>
</head>
<body>
    <h1>Password Strength Checker</h1>
    <input type="password" id="password" placeholder="Enter your password" oninput="checkPasswordStrength()">
    <p id="strengthMessage" class="strength"></p>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthMessage = document.getElementById('strengthMessage');
            let strength = 'Weak';
            let strengthClass = 'weak';

            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[a-z]/.test(password) && /\d/.test(password) && /[@$!%*?&]/.test(password)) {
                    strength = 'Strong';
                    strengthClass = 'strong';
                } else if ((/[A-Z]/.test(password) && /[a-z]/.test(password)) || (/\d/.test(password) && /[a-z]/.test(password))) {
                    strength = 'Medium';
                    strengthClass = 'medium';
                }
                else {
                    strength = 'Weak';
                    strengthClass = 'weak';
                }
            }
            else{
                strength = 'Weak';
                strengthClass = 'weak';
            }

            strengthMessage.textContent = `Password Strength: ${strength}`;
            strengthMessage.className = `strength ${strengthClass}`;
        }
    </script>
</body>
</html>
